    <h2>The Repatriation Reality — What NRIs Actually Experience</h2>
    <p>Repatriation of NRE funds is legally unrestricted — principal and interest can be freely moved abroad at any time. The practical experience, however, varies by bank and amount:</p>

    <h2>NRE vs NRO — Quick Reminder</h2>
