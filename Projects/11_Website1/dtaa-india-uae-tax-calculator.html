    <h2>What the India-UAE DTAA Actually Covers</h2>
    <p>The India-UAE DTAA (signed 1993, updated 2007) covers income from dividends, interest, royalties, capital gains, and business profits. Key provisions for UAE-based NRIs:</p>
    <ul>
      <li><strong>Interest income (NRO FD, savings):</strong> Taxed in India at 12.5% under DTAA instead of standard 30% TDS. You must submit Form 10F and a Tax Residency Certificate (TRC) from the UAE to your Indian bank to claim this.</li>
      <li><strong>Dividends:</strong> Taxed in India at 10% (standard rate for NRIs under current rules). DTAA does not reduce this further for UAE residents.</li>
      <li><strong>Capital gains on property:</strong> Taxed in India; 20% LTCG with indexation (or 12.5% without) on property sold after 2 years. UAE does not tax this, so no double tax issue.</li>
      <li><strong>Capital gains on equity:</strong> LTCG above &#8377;1.25L taxed at 12.5% in India. Not covered by DTAA capital gains article; taxed only in India.</li>
      <li><strong>Rental income:</strong> Taxed in India at slab rates (after 30% standard deduction). DTAA does not eliminate this but ensures it is not also taxed in UAE.</li>
    </ul>
    <h2>How to Claim Lower TDS Under DTAA (Step by Step)</h2>
    <ul>
      <li>Obtain a <strong>Tax Residency Certificate (TRC)</strong> from the UAE Federal Tax Authority. As of 2026, this is issued online through the FTA portal and costs AED 2,000.</li>
      <li>Complete <strong>Form 10F</strong> — available on the Indian Income Tax portal. Self-declaration of UAE residency details.</li>
      <li>Submit TRC + Form 10F to your Indian bank before the FD matures or interest is credited. The bank will then apply the DTAA rate (12.5%) instead of the standard 30%.</li>
      <li>File your Indian ITR (Form ITR-2 or ITR-3) to report NRO income, claim DTAA benefit formally, and obtain any TDS refund.</li>
    </ul>
    <h2>Common Mistakes UAE NRIs Make</h2>
    <ul>
      <li>Not submitting TRC to the bank and losing 17.5% in excess TDS that has to be refunded via ITR filing (often taking 12&ndash;18 months).</li>
      <li>Assuming all Indian income is covered by DTAA. Capital gains on equity are not; slab-rate income (salary from India) is not exempt.</li>
      <li>Confusing NRE and NRO tax treatment. NRE FD interest is entirely tax-free in India — DTAA is irrelevant for it.</li>
    </ul>
