<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRI Finance Hub — X Post Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

.hdr{background:#0f1728;border-bottom:1px solid #1e293b;padding:14px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.hdr-logo{width:40px;height:40px;background:#ffb300;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#0a0e1a}
.hdr-title{font-size:17px;font-weight:800}
.hdr-sub{font-size:12px;color:#64748b;margin-top:2px}
.hdr-badge{margin-left:auto;background:#0f2a1a;border:1px solid #166534;color:#22c55e;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px}

.tabs{background:#0f1728;border-bottom:1px solid #1e293b;display:flex;padding:0 28px}
.tab-btn{padding:13px 22px;background:none;border:none;color:#64748b;font-size:14px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#ffb300;border-bottom-color:#ffb300}
.tab-btn:hover:not(.active){color:#fff}
.tab-count{background:#1e293b;color:#94a3b8;font-size:11px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px}

.page{padding:24px 28px;max-width:880px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat{background:#141f38;border:1px solid #1e293b;border-radius:12px;padding:16px;text-align:center}
.stat-n{font-size:32px;font-weight:900;color:#ffb300}
.stat-l{font-size:12px;color:#64748b;margin-top:3px}

.sec-lbl{font-size:11px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

.card{background:#111827;border:1px solid #1e293b;border-radius:14px;margin-bottom:16px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#334155}
.card.is-done{border-color:#166534;opacity:.65}

.card-head{display:flex;align-items:center;gap:10px;padding:14px 18px 0;flex-wrap:wrap}
.num-badge{background:#1e293b;color:#94a3b8;font-size:11px;font-weight:800;padding:3px 8px;border-radius:5px}
.cat-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.file-name{font-size:11px;color:#334155;margin-left:auto}

.poster-wrap{padding:12px 18px 0}
.poster-img{width:100%;max-height:190px;object-fit:cover;object-position:top;border-radius:8px;border:1px solid #1e293b;display:block}
.poster-miss{width:100%;height:80px;background:#0d1424;border:1px dashed #1e293b;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#334155;font-size:12px}

.post-body{margin:12px 18px;background:#0d1424;border:1px solid #1e293b;border-radius:10px;padding:14px;font-size:14px;line-height:1.8;color:#e2e8f0;white-space:pre-wrap;font-family:inherit}

.orig-block{margin:12px 18px 0;background:#080f1e;border-left:3px solid #334155;border-radius:0 8px 8px 0;padding:10px 14px}
.orig-lbl{font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.orig-author{font-size:13px;font-weight:700;color:#60a5fa;margin-bottom:4px}
.orig-text{font-size:13px;color:#64748b;line-height:1.55}

.card-foot{display:flex;align-items:center;gap:8px;padding:12px 18px 14px;flex-wrap:wrap}

.cc{font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px}
.cc-ok{background:#0f2a1a;color:#22c55e;border:1px solid #166534}
.cc-warn{background:#2a1a00;color:#f59e0b;border:1px solid #92400e}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap}
.btn-copy{background:#1e293b;color:#94a3b8}
.btn-copy:hover{background:#334155;color:#fff}
.btn-copy.copied{background:#0f2a1a;color:#22c55e}
.btn-mark{background:transparent;color:#475569;border:1px solid #334155}
.btn-mark:hover{background:#0f2a1a;color:#22c55e;border-color:#166534}
.btn-mark.is-done{background:#0f2a1a;color:#22c55e;border-color:#166534}
.btn-post{background:#111;color:#fff;margin-left:auto}
.btn-post:hover{background:#222}
.btn-reply{background:#1d4ed8;color:#fff;margin-left:auto}
.btn-reply:hover{background:#2563eb}

.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar input{flex:1;background:#141f38;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none}
.search-bar input:focus{border-color:#ffb300}
.search-bar input::placeholder{color:#475569}

.filter-tags{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ftag{padding:6px 14px;border-radius:20px;border:1px solid #1e293b;background:transparent;color:#64748b;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s}
.ftag.on,.ftag:hover{border-color:currentColor}
</style>
</head>

// ── STATE ────────────────────────────────────────────────────────────────────
const doneSet = new Set(JSON.parse(localStorage.getItem('nfh_done')||'[]'));

function saveDone(){
  localStorage.setItem('nfh_done', JSON.stringify([...doneSet]));
  updateStats();
}

function updateStats(){
  const n = doneSet.size;
  document.getElementById('s-done').textContent = n;
  document.getElementById('s-left').textContent = 12 - n;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function ccBadge(text){
  const n = text.trim().length;
  const ok = n <= 250;
  return `<span class="cc ${ok?'cc-ok':'cc-warn'}">${ok?'✓':'⚠'} ${n}/250</span>`;
}

function copyBtn(){ return `<button class="btn btn-copy">⎘ Copy</button>`; }

function openX(text, tid){
  const base = tid
    ? `https://twitter.com/intent/tweet?in_reply_to=${tid}&text=`
    : 'https://twitter.com/intent/tweet?text=';
  window.open(base + encodeURIComponent(text), '_blank');
}

function markDone(id, btn, card){
  if(doneSet.has(id)){ doneSet.delete(id); } else { doneSet.add(id); }
  saveDone();
  const on = doneSet.has(id);
  card.classList.toggle('is-done', on);
  btn.classList.toggle('is-done', on);
  btn.textContent = on ? '✓ Posted' : 'Mark Posted';
}

// ── RENDER POSTS ─────────────────────────────────────────────────────────────
function renderPosts(){
  const list = document.getElementById('posts-list');
  POSTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card' + (doneSet.has(p.id) ? ' is-done' : '');

    // poster image
    const img = document.createElement('img');
    img.className = 'poster-img';
    img.src = p.poster;
    img.alt = p.id;

    const posterWrap = document.createElement('div');
    posterWrap.className = 'poster-wrap';
    img.onerror = () => {
      posterWrap.innerHTML = `<div class="poster-miss">🖼 ${p.poster.split('/')[1]}</div>`;
    };
    posterWrap.appendChild(img);

    const body = document.createElement('div');
    body.className = 'post-body';
    body.textContent = p.text;

    const foot = document.createElement('div');
    foot.className = 'card-foot';
    foot.innerHTML = ccBadge(p.text) + copyBtn() +
      `<button class="btn btn-mark ${doneSet.has(p.id)?'is-done':''}">${doneSet.has(p.id)?'✓ Posted':'Mark Posted'}</button>` +
      `<button class="btn btn-post">Post on ✕</button>`;

    // head
    const head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML = `<span class="num-badge">${p.id}</span>
      <span class="cat-badge" style="color:${p.cc};background:${p.cb}">${p.cat}</span>
      <span class="file-name">${p.poster.split('/')[1]}</span>`;

    card.appendChild(head);
    card.appendChild(posterWrap);
    card.appendChild(body);
    card.appendChild(foot);

    // events
    foot.querySelector('.btn-copy').addEventListener('click', function(){
      navigator.clipboard.writeText(p.text).then(()=>{
        this.textContent='✓ Copied!'; this.classList.add('copied');
        setTimeout(()=>{ this.textContent='⎘ Copy'; this.classList.remove('copied'); },2000);
      });
    });
    const markBtn = foot.querySelector('.btn-mark');
    markBtn.addEventListener('click', () => markDone(p.id, markBtn, card));
    foot.querySelector('.btn-post').addEventListener('click', () => openX(p.text, null));

    list.appendChild(card);
  });
}

// ── RENDER REPLIES ───────────────────────────────────────────────────────────
function renderReplies(){
  const list = document.getElementById('replies-list');
  REPLIES.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML = `<span class="num-badge">#${i+1}</span>
      <span style="font-size:14px;font-weight:800;color:#60a5fa">${r.handle}</span>
      <span class="cat-badge" style="color:#94a3b8;background:#1e293b">${r.topic}</span>`;

    const orig = document.createElement('div');
    orig.className = 'orig-block';
    orig.innerHTML = `<div class="orig-lbl">Original Post</div>
      <div class="orig-text">${r.orig}</div>`;

    const body = document.createElement('div');
    body.className = 'post-body';
    body.textContent = r.text;

    const foot = document.createElement('div');
    foot.className = 'card-foot';
    const isReply = !!r.tid;
    foot.innerHTML = ccBadge(r.text) + copyBtn() +
      `<button class="btn ${isReply?'btn-reply':'btn-post'}" style="margin-left:auto">
        ${isReply ? '↩ Reply on ✕' : 'Post on ✕'}
      </button>`;

    card.appendChild(head);
    card.appendChild(orig);
    card.appendChild(body);
    card.appendChild(foot);

    foot.querySelector('.btn-copy').addEventListener('click', function(){
      navigator.clipboard.writeText(r.text).then(()=>{
        this.textContent='✓ Copied!'; this.classList.add('copied');
        setTimeout(()=>{ this.textContent='⎘ Copy'; this.classList.remove('copied'); },2000);
      });
    });
    foot.querySelector('button:last-child').addEventListener('click', () => openX(r.text, r.tid));

    list.appendChild(card);
  });
}

// ── TABS ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── INIT ─────────────────────────────────────────────────────────────────────
renderPosts();
renderReplies();
updateStats();
</script>

</html>
