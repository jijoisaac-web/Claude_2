<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Finance Portfolio Dashboard",
  "schemaVersion": 1,
  "description": "Live personal finance portfolio dashboard. Pulls the Google Sheet \"Finance\" on each open, parses the summary + daily time series, and shows net worth, allocation, trend, composition-over-time and a holdings table across Mutual Funds, Indian Equity, DELL Shares, Cash, Fixed Deposit, PRS Malaysia and EPF Malaysia. INR/MYR toggle with editable FX rate. Sheet values are in INR.",
  "mcpTools": [
    "mcp__13cc7b57-0f3b-4edd-8dec-1cabf9b8d326__read_file_content"
  ],
  "mcpServerNames": [
    "Google Drive"
  ]
}
</script>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Portfolio Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{ color-scheme: light;
  --bg:#f6f8fc; --panel:#ffffff; --line:#e3e8f2; --txt:#1c2538;
  --mut:#6b7794; --acc:#3b6fff; --grn:#12a86b; --red:#e23b5a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,Roboto,sans-serif;padding:22px;max-width:1280px;margin:0 auto}
h1{font-size:22px;font-weight:680}
.sub{color:var(--mut);font-size:13px;margin-top:4px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:20px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toggle{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.toggle button{background:transparent;color:var(--mut);border:0;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.toggle button.on{background:var(--acc);color:#fff}
.rate{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12px;color:var(--mut)}
.rate input{width:74px;border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px;color:var(--txt);background:#fbfcff}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(4,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(20,30,60,.04)}
.kpi .lab{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
.kpi .val{font-size:24px;font-weight:730;margin-top:7px}
.kpi .alt{color:var(--mut);font-size:13px;margin-top:3px}
.pos{color:var(--grn)} .neg{color:var(--red)}
.row{display:grid;grid-template-columns:1.05fr 1fr;gap:14px;margin-top:14px}
.row3{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.ctitle{font-size:14px;font-weight:670;margin-bottom:12px}
.cwrap{position:relative;height:300px}
.cwrap.tall{height:330px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:9px 8px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td:first-child,th:first-child{text-align:left}
tr:last-child td{border-bottom:0}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;vertical-align:middle}
.foot{color:var(--mut);font-size:12px;margin-top:20px;text-align:center;line-height:1.6}
.state{padding:40px;text-align:center;color:var(--mut);font-size:14px}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>Finance Portfolio Dashboard</h1>
    <div class="sub" id="subline">Loading from Google Sheet…</div>
  </div>
  <div class="controls">
    <div class="rate">1 ₹ = <input id="rate" type="number" step="0.0001" value="0.0412"/> RM</div>
    <div class="toggle">
      <button id="bINR" class="on" onclick="setCur('INR')">₹ INR</button>
      <button id="bMYR" onclick="setCur('MYR')">RM MYR</button>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="grid kpis" id="kpis"></div>
  <div class="row">
    <div class="card"><div class="ctitle">Allocation by asset class</div><div class="cwrap"><canvas id="alloc"></canvas></div></div>
    <div class="card"><div class="ctitle">Net worth — recent history</div><div class="cwrap"><canvas id="trend"></canvas></div></div>
  </div>
  <div class="row3">
    <div class="card"><div class="ctitle">Composition over time</div><div class="cwrap tall"><canvas id="stack"></canvas></div></div>
  </div>
  <div class="row3">
    <div class="card">
      <div class="ctitle">Holdings detail</div>
      <table id="tbl"><thead><tr>
        <th>Asset class</th><th>Invested</th><th>Current</th><th>Profit / Loss</th><th>Return</th><th>Weight</th>
      </tr></thead><tbody></tbody></table>
    </div>
  </div>
  <div class="foot" id="foot"></div>
</div>

<div class="state" id="state">Fetching latest data from your “Finance” sheet…</div>

<script>
const FILE_ID='1rb88bBTcS3Zq_VYTCc9hvdJhVgXdd_KdmI-auAc2_Mc';
const TOOL='mcp__13cc7b57-0f3b-4edd-8dec-1cabf9b8d326__read_file_content';
const CATS=[
  {name:'Mutual Funds', cols:['Mutual Fund'], color:'#3b6fff'},
  {name:'DELL Shares (US)', cols:['DELL Shares'], color:'#8b5cf6'},
  {name:'Cash', cols:['Cash NRE','Cash NRO'], color:'#12a86b'},
  {name:'Fixed Deposit', cols:['Fixed Deposit'], color:'#06b6d4'},
  {name:'Indian Equity', cols:['Equity','NRO-Derivatives','Zerodha Orbis'], color:'#e0a90f'},
  {name:'PRS Malaysia', cols:['PRS Malaysia'], color:'#e23b5a'},
  {name:'EPF Malaysia', cols:['EPF Malaysia'], color:'#f97316'},
];

let CUR='INR', RATE=parseFloat(localStorage.getItem('inrmyr')||'0.0412');
let D=null, charts={};
document.getElementById('rate').value=RATE;

function num(s){ if(s==null) return null; s=(''+s).replace(/,/g,'').replace(/\\/g,'').trim(); const v=parseFloat(s); return isNaN(v)?null:v; }
function cells(l){ return l.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(x=>x.trim()); }
function isSep(l){ return /^\|?[\s:|-]+\|?$/.test(l) && l.includes('-'); }

function parseTables(text){
  const lines=text.split('\n'); const blocks=[]; let cur=[];
  for(const l of lines){
    if(l.trim().startsWith('|')) cur.push(l);
    else { if(cur.length) blocks.push(cur); cur=[]; }
  }
  if(cur.length) blocks.push(cur);
  return blocks.map(b=>{
    const rows=b.filter(l=>!isSep(l)).map(cells);
    return {header:rows[0]||[], rows:rows.slice(1)};
  });
}

function extractText(res){
  if(res==null) return '';
  if(typeof res==='string'){ try{const j=JSON.parse(res); return extractText(j);}catch(e){ return res; } }
  if(res.fileContent) return res.fileContent;
  if(res.content){
    if(typeof res.content==='string') return res.content;
    if(Array.isArray(res.content)) return res.content.map(c=>c.text||c.fileContent||'').join('\n');
  }
  if(res.result) return extractText(res.result);
  if(res.text) return res.text;
  return JSON.stringify(res);
}

function buildModel(text){
  const tables=parseTables(text);
  // timeseries: header first cell starts with 'Date'
  const ts=tables.find(t=>t.header[0] && /^date/i.test(t.header[0]));
  const hdr=ts.header;
  const series=ts.rows.filter(r=>/^\d{4}-\d{2}-\d{2}/.test(r[0]||'')).map(r=>{
    const rec={date:r[0]};
    hdr.forEach((h,j)=>{ if(j>1) rec[h]=num(r[j]); });
    return rec;
  }).sort((a,b)=>a.date<b.date?-1:1);
  // summary: header[0]=='Name' and has Invested, small width
  const sm=tables.find(t=>/^name/i.test(t.header[0]||'') && t.header.some(h=>/invested/i.test(h)) && t.header.length<=6);
  const summary={};
  if(sm){ sm.rows.forEach(r=>{ if(r[0]) summary[r[0]]={invested:num(r[1]),current:num(r[2])}; }); }
  return {series, summary, updated: series[series.length-1].date};
}

function conv(v){ return CUR==='INR'? v : v*RATE; }
function sym(){ return CUR==='INR'? '₹':'RM'; }
function fmt(v){ return sym()+' '+conv(v).toLocaleString(undefined,{maximumFractionDigits:0}); }
function fmtC(v){ v=conv(v); const a=Math.abs(v); let s;
  if(CUR==='INR') s = a>=1e7?(v/1e7).toFixed(2)+' Cr': a>=1e5?(v/1e5).toFixed(2)+' L': v.toFixed(0);
  else s = a>=1e6?(v/1e6).toFixed(2)+'M': a>=1e3?(v/1e3).toFixed(1)+'k': v.toFixed(0);
  return sym()+' '+s; }
function tick(v){ if(CUR==='INR') return v>=1e7?'₹'+(v/1e7).toFixed(1)+'Cr':'₹'+(v/1e5).toFixed(0)+'L'; return 'RM'+(v/1e6).toFixed(1)+'M'; }

function catData(){
  const last=D.series[D.series.length-1];
  return CATS.map(c=>{
    let cur=0,inv=0;
    c.cols.forEach(col=>{ cur+=last[col]||0; const s=D.summary[col]; if(s&&s.invested!=null) inv+=s.invested; });
    return {name:c.name,color:c.color,current:cur,invested:inv,pl:cur-inv};
  }).filter(c=>c.current>0||c.invested>0);
}

function render(){
  if(!D) return;
  const cats=catData();
  const total=cats.reduce((a,c)=>a+c.current,0);
  const totInv=cats.reduce((a,c)=>a+c.invested,0);
  const totPL=total-totInv, plPct=totInv?totPL/totInv*100:0;
  const other= CUR==='INR'? ('RM '+(total*RATE).toLocaleString(undefined,{maximumFractionDigits:0})):('₹ '+total.toLocaleString(undefined,{maximumFractionDigits:0}));
  document.getElementById('kpis').innerHTML=`
   <div class="card kpi"><div class="lab">Net Worth</div><div class="val">${fmt(total)}</div><div class="alt">${other}</div></div>
   <div class="card kpi"><div class="lab">Total Invested</div><div class="val">${fmt(totInv)}</div><div class="alt">cost basis</div></div>
   <div class="card kpi"><div class="lab">Unrealised P/L</div><div class="val ${totPL>=0?'pos':'neg'}">${totPL>=0?'+':''}${fmt(totPL)}</div><div class="alt ${totPL>=0?'pos':'neg'}">${plPct>=0?'+':''}${plPct.toFixed(2)}%</div></div>
   <div class="card kpi"><div class="lab">Holdings</div><div class="val">${cats.length}</div><div class="alt">asset classes</div></div>`;
  const tb=document.querySelector('#tbl tbody');
  tb.innerHTML=cats.slice().sort((a,b)=>b.current-a.current).map(c=>{
    const pct=c.invested?c.pl/c.invested*100:0, w=total?c.current/total*100:0;
    return `<tr><td><span class="dot" style="background:${c.color}"></span>${c.name}</td>
     <td>${fmtC(c.invested)}</td><td>${fmtC(c.current)}</td>
     <td class="${c.pl>=0?'pos':'neg'}">${c.pl>=0?'+':''}${fmtC(c.pl)}</td>
     <td class="${c.pl>=0?'pos':'neg'}">${c.invested?(pct>=0?'+':'')+pct.toFixed(1)+'%':'—'}</td>
     <td>${w.toFixed(1)}%</td></tr>`;
  }).join('');
  document.getElementById('subline').textContent=`Last updated ${D.updated} • values in ${CUR} • ${D.series.length} days of history`;
  document.getElementById('foot').innerHTML=`Live from Google Sheet “Finance”. Sheet values stored in INR; MYR at 1 INR = ${RATE} MYR (edit above). Unrealised P/L vs recorded cost basis; cash & FD have no cost-basis gain.`;
  drawCharts(cats,total);
}

function drawCharts(cats,total){
  Object.values(charts).forEach(c=>c&&c.destroy());
  Chart.defaults.color='#6b7794'; Chart.defaults.font.family="'Segoe UI',system-ui,sans-serif";
  const g='#e3e8f2';
  charts.alloc=new Chart(alloc,{type:'doughnut',
    data:{labels:cats.map(c=>c.name),datasets:[{data:cats.map(c=>conv(c.current)),backgroundColor:cats.map(c=>c.color),borderColor:'#fff',borderWidth:2}]},
    options:{cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:11,padding:9,font:{size:11}}},
      tooltip:{callbacks:{label:x=>{const p=(x.raw/conv(total)*100).toFixed(1);return ` ${x.label}: ${sym()} ${x.raw.toLocaleString(undefined,{maximumFractionDigits:0})} (${p}%)`;}}}}}});
  const labels=D.series.map(r=>r.date.slice(5));
  charts.trend=new Chart(trend,{type:'line',
    data:{labels,datasets:[{data:D.series.map(r=>conv(r['Grand Total']!=null?r['Grand Total']:Object.keys(r).filter(k=>k!=='date').reduce((a,k)=>a+(r[k]||0),0))),borderColor:'#3b6fff',backgroundColor:'rgba(59,111,255,.10)',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>' '+sym()+' '+x.raw.toLocaleString(undefined,{maximumFractionDigits:0})}}},
      scales:{x:{grid:{color:g},ticks:{maxTicksLimit:8}},y:{grid:{color:g},ticks:{callback:tick}}}}});
  const ds=CATS.map(c=>({label:c.name,backgroundColor:c.color,borderColor:c.color,data:D.series.map(r=>conv(c.cols.reduce((a,col)=>a+(r[col]||0),0))),fill:true,stack:'s',borderWidth:0,pointRadius:0,tension:.2}));
  charts.stack=new Chart(stack,{type:'line',data:{labels,datasets:ds},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:11,padding:8,font:{size:11}}},tooltip:{mode:'index',intersect:false,callbacks:{label:x=>' '+x.dataset.label+': '+sym()+' '+x.raw.toLocaleString(undefined,{maximumFractionDigits:0})}}},
      scales:{x:{grid:{color:g},ticks:{maxTicksLimit:8}},y:{stacked:true,grid:{color:g},ticks:{callback:tick}}}}});
}

function setCur(c){ CUR=c; bINR.classList.toggle('on',c==='INR'); bMYR.classList.toggle('on',c==='MYR'); render(); }
document.getElementById('rate').addEventListener('change',e=>{ const v=parseFloat(e.target.value); if(v>0){ RATE=v; localStorage.setItem('inrmyr',v); render(); }});

async function load(){
  try{
    const res=await window.cowork.callMcpTool(TOOL,{fileId:FILE_ID});
    const text=extractText(res);
    if(!text || text.length<50) throw new Error('Empty response');
    D=buildModel(text);
    document.getElementById('state').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }catch(err){
    document.getElementById('state').innerHTML='Could not load the sheet.<br><small>'+(err&&err.message?err.message:err)+'</small>';
  }
}
load();
</script>
</body>
</html>
